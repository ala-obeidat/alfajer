name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Vitest + security-invariant guards
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Workspace install at root covers every member (apps/signaling +
      # apps/web). No per-workspace install needed.
      - name: Install workspace dependencies
        run: bun install --no-frozen-lockfile

      - name: Signaling tests (rate-limit unit tests, room, turn)
        run: bunx vitest run --dir apps/signaling/src

      - name: Web tests (security-invariant regression guards + any others)
        run: bunx vitest run --dir apps/web/src

  audit:
    name: Dependency audit (high+ severity)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Advisory-level reporting only — Dependabot handles the actual
      # upgrades. continue-on-error so a transient registry advisory
      # doesn't block unrelated merges; the result is still visible
      # in the workflow log.
      - name: Bun audit (workspace)
        run: bun audit --severity high
        continue-on-error: true
