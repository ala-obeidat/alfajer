name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Vitest + security-invariant guards
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies (workspace root)
        run: bun install --frozen-lockfile

      - name: Install signaling deps
        working-directory: apps/signaling
        run: bun install --production=false --no-frozen-lockfile

      - name: Run signaling tests (rate-limit, room, turn)
        run: bunx vitest run --dir apps/signaling/src

      - name: Run web tests (security-invariants + any others)
        run: bunx vitest run --dir apps/web/src

  audit:
    name: Dependency audit (high+ severity)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Audit root workspace
        run: bun audit --severity high
        continue-on-error: true # advisories aren't actionable on every push but visible in logs

      - name: Audit signaling
        working-directory: apps/signaling
        run: bun audit --severity high
        continue-on-error: true
