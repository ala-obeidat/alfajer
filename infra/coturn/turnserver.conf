# Hardened CoTURN configuration for Hetzner CAX (Ubuntu 24.04 ARM64)
listening-port=3478
tls-listening-port=443

realm=turn.alaobeidat.com
server-name=turn.alaobeidat.com

use-auth-secret
static-auth-secret=${TURN_STATIC_AUTH_SECRET}

# TLS certificates (managed by certbot)
cert=/etc/letsencrypt/live/turn.alaobeidat.com/fullchain.pem
pkey=/etc/letsencrypt/live/turn.alaobeidat.com/privkey.pem

# Security Hardening
no-loopback-peers
no-multicast-peers

denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=169.254.0.0-169.254.255.255

no-cli
no-tlsv1
no-tlsv1_1

# Ephemeral port range
min-port=49152
max-port=65535
