<!doctype html>
<html lang="en" translate="no">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />
		<meta name="google" content="notranslate" />
		<meta name="theme-color" content="#0f172a" />
		<!-- mobile-web-app-capable is the modern standard; apple-mobile-web-app-capable
		     is kept for iOS Safari versions older than 16.4. -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Alfajer" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="apple-touch-icon" href="/icon.svg" />
		<link rel="manifest" href="/manifest.webmanifest" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="notranslate">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
