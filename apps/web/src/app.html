<!doctype html>
<html lang="en" translate="no">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />
		<meta name="google" content="notranslate" />
		<meta name="theme-color" content="#0f172a" />
		<!-- mobile-web-app-capable is the modern standard; apple-mobile-web-app-capable
		     is kept for iOS Safari versions older than 16.4. -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Alfajer" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="apple-touch-icon" sizes="192x192" href="/pwa-192x192.png" />
		<link rel="apple-touch-icon" sizes="512x512" href="/pwa-512x512.png" />
		<link rel="manifest" href="/manifest.webmanifest" />

		<!-- Open Graph / Twitter card for nicer link previews when sharing via
		     WhatsApp, Telegram, Twitter/X, Discord, Slack, iMessage, etc. -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Alfajer" />
		<meta property="og:title" content="Alfajer — anonymous 1-to-1 calls" />
		<meta property="og:description" content="Private video calls. No accounts, no logs, end-to-end encrypted." />
		<meta property="og:url" content="https://alfajer.alaobeidat.com" />
		<!-- PNG is mandatory for WhatsApp / iMessage / Twitter / Discord / LinkedIn,
		     all of which reject SVG og:image entries. The SVG version is kept
		     listed below as a hint for crawlers that DO support it. -->
		<meta property="og:image" content="https://alfajer.alaobeidat.com/og-card.png" />
		<meta property="og:image:type" content="image/png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="Alfajer — fully anonymous 1-to-1 calls" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Alfajer — anonymous 1-to-1 calls" />
		<meta name="twitter:description" content="Private video calls. No accounts, no logs, end-to-end encrypted." />
		<meta name="twitter:image" content="https://alfajer.alaobeidat.com/og-card.png" />
		<meta name="description" content="Fully anonymous, private, secret 1-to-1 calls. No accounts. No logs. End-to-end via WebRTC." />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="notranslate">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
